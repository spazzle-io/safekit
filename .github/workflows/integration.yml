name: integration-tests

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.24'

jobs:
  integration:
    name: ${{ matrix.version }} on ${{ matrix.chain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - chain: ethereum-sepolia
            chain_id: "11155111"
            version: "1.3.0"
            rpc_secret: ETH_SEPOLIA_RPC_URL
            key_secret: ETH_SEPOLIA_ADMIN_KEY

          - chain: ethereum-sepolia
            chain_id: "11155111"
            version: "1.4.1"
            rpc_secret: ETH_SEPOLIA_RPC_URL
            key_secret: ETH_SEPOLIA_ADMIN_KEY

          - chain: ethereum-sepolia
            chain_id: "11155111"
            version: "1.5.0"
            rpc_secret: ETH_SEPOLIA_RPC_URL
            key_secret: ETH_SEPOLIA_ADMIN_KEY

          - chain: base-sepolia
            chain_id: "84532"
            version: "1.3.0"
            rpc_secret: BASE_SEPOLIA_RPC_URL
            key_secret: BASE_SEPOLIA_ADMIN_KEY

          - chain: base-sepolia
            chain_id: "84532"
            version: "1.4.1"
            rpc_secret: BASE_SEPOLIA_RPC_URL
            key_secret: BASE_SEPOLIA_ADMIN_KEY

          - chain: base-sepolia
            chain_id: "84532"
            version: "1.5.0"
            rpc_secret: BASE_SEPOLIA_RPC_URL
            key_secret: BASE_SEPOLIA_ADMIN_KEY

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: run-integration-tests
        env:
          SAFEKIT_TEST_RPC_URL:   ${{ secrets[matrix.rpc_secret] }}
          SAFEKIT_TEST_ADMIN_KEY: ${{ secrets[matrix.key_secret] }}
          SAFEKIT_TEST_CHAIN_ID:  ${{ matrix.chain_id }}
          SAFEKIT_TEST_VERSION:   ${{ matrix.version }}
        run: go test -tags integration -timeout 10m -v ./pkg/safe/...
